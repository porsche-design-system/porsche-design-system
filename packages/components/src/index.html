<!doctype html>
<html dir="ltr" lang="en" class="bg-surface">
  <head>
    <meta charset="utf-8" />
    <title>Playground</title>
    <base href="/" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <link href="/favicon.ico" rel="icon" type="image/x-icon" />
    <link href="http://localhost:3001/styles/font-face.css" rel="stylesheet" type="text/css" />
    <script nomodule src="/build/porsche-design-system.js"></script>
    <script src="/build/porsche-design-system.esm.js" type="module"></script>
    <link rel="stylesheet" href="/assets/tailwind.css">
    <style>
      .legacy {
        --_p-legacy-radius-small: 4px;
        --_p-legacy-radius-medium: 8px;
        --_p-legacy-radius-large: 12px;
      }
    </style>
  </head>
  <body>

    <div id="main" class="grid gap-fluid-md grid-cols-3">
      <div data-card="pagination" style="grid-column: 1 / -1;">
        <p-pagination total-items-count="500" items-per-page="25" active-page="1"></p-pagination>
<!--        <p-pagination total-items-count="500" items-per-page="25" active-page="1" show-last-page="false"></p-pagination>-->
      </div>
    </div>

    <script>
      const pagination = document.querySelector('p-pagination');
      pagination.hrefBuilder = (page) => `https://www.porsche.com?page=${page}`;

      ['componentWillLoad', 'componentDidLoad', 'componentWillUpdate', 'componentDidUpdate'].forEach((x) =>
        window.addEventListener(`stencil_${x}`, (e) => {
          const eventName = e.type + (e.type.includes('Did') ? ' ' : '');
          console.log(eventName, e.composedPath()[0].tagName.toLowerCase(), new Date().toISOString());
        })
      );
    </script>

  </body>
</html>
